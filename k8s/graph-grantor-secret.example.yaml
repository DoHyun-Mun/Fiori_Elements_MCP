# ══════════════════════════════════════════════════════════════
# HANA Graph Grantor User Service Binding Secret 예시 (placeholder)
# ──────────────────────────────────────────────────────────────
# HANA Graph Engine 권한 부여용 사용자(GRAPH_USER_*) 자격증명.
# CAP 백엔드 Pod에 ServiceBinding 형식으로 마운트되어 HANA Graph 호출 시 사용.
#
# 사용법:
#   1. 이 파일을 'k8s/graph-grantor-secret.yaml' 로 복사
#   2. HANA Cloud Cockpit / DB admin 콘솔에서 발급받은 사용자/비밀번호로 교체
#   3. kubectl apply -f k8s/graph-grantor-secret.yaml
#
# ⚠️ graph-grantor-secret.yaml 은 .gitignore 처리됨 — 절대 commit 금지
# ══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: graph-grantor
  namespace: store-pjt
type: Opaque
stringData:
  .metadata: >-
    {"credentialProperties":[{"name":"host","format":"text"},{"name":"port","format":"text"},{"name":"user","format":"text"},{"name":"password","format":"text"},{"name":"schema","format":"text"},{"name":"encrypt","format":"text"},{"name":"validateCertificate","format":"text"}],"metaDataProperties":[{"name":"plan","format":"text"},{"name":"label","format":"text"},{"name":"type","format":"text"},{"name":"tags","format":"json"}]}
  type: "hana"
  label: "hana"
  tags: '["hana","database","relational"]'
  plan: "hdi-shared"
  host: "<HANA_HOST>"
  port: "443"
  user: "<HANA_GRAPH_USER>"
  password: "<HANA_GRAPH_PASSWORD>"
  schema: "<HANA_GRAPH_SCHEMA>"
  encrypt: "true"
  validateCertificate: "true"