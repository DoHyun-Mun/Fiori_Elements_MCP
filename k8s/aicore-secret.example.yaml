# ══════════════════════════════════════════════════════════════
# AI Core Service Key Secret 예시 (placeholder)
# ──────────────────────────────────────────────────────────────
# 사용법:
#   1. 이 파일을 'k8s/aicore-secret.yaml' 로 복사
#        cp k8s/aicore-secret.example.yaml k8s/aicore-secret.yaml
#   2. <PLACEHOLDER> 값들을 실제 값으로 교체
#   3. kubectl apply -f k8s/aicore-secret.yaml
#
# ⚠️ aicore-secret.yaml 은 .gitignore 에 의해 git 에서 제외됨 — 절대 commit 금지
# ══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: aicore-secret
  namespace: store-pjt
type: Opaque
stringData:
  AICORE_SERVICE_KEY: |
    {
      "serviceurls": {
        "AI_API_URL": "<AI_API_URL>"
      },
      "appname": "aicore",
      "clientid": "<AICORE_CLIENT_ID>",
      "clientsecret": "<AICORE_CLIENT_SECRET>",
      "url": "<AICORE_OAUTH_URL>"
    }
  AICORE_RESOURCE_GROUP: "default"
  AICORE_DEPLOYMENT_ID: "<AICORE_DEPLOYMENT_ID>"
  MCP_SERVER_URL: "<MCP_SERVER_URL>"