apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiori-mcp-test
  namespace: fiori-mcp-test
  labels:
    app: fiori-mcp-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fiori-mcp-test
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "true"
      labels:
        app: fiori-mcp-test
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: fiori-mcp-test
          image: "ghcr.io/dohyun-mun/fiori-mcp-test:latest"
          imagePullPolicy: Always
          ports:
            - containerPort: 4004
          env:
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"