# Default values for inventory-management
replicaCount: 1

image:
  repository: inventory-management
  pullPolicy: IfNotPresent
  tag: "1.0.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

service:
  type: ClusterIP
  port: 4004

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: inventory.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

env:
  NODE_ENV: production
  CDS_ENV: production

livenessProbe:
  httpGet:
    path: /
    port: 4004
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: 4004
  initialDelaySeconds: 15
  periodSeconds: 5